name: Feature request
description: Propose a user-facing enhancement
title: "feat(<scope>): <short feature summary>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem and the desired outcome.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What user problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options:
        - Frontend (src/)
        - Tauri backend (src-tauri/)
        - Build/Release
        - Developer workflow
        - Documentation
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
